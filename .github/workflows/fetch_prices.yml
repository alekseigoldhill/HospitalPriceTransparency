name: Fetch Hospital Prices
on:
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:
jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install requests psycopg2-binary
      - name: Fetch hospital prices
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python predigest/fetch_hospital.py
